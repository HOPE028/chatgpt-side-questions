<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>ChatGPT Side-Question — Settings</title>
    <link rel="stylesheet" href="options.css" />
  </head>
  <body>
    <main>
      <h1>ChatGPT Side-Question</h1>
      <p class="sub">
        Highlight text in a ChatGPT reply, click the pill, and ask a follow-up.
        The answer is generated by OpenAI using the key you set below and
        rendered inline — it never touches your main ChatGPT thread.
      </p>

      <label>
        <span>OpenAI API key</span>
        <input
          type="password"
          id="api-key"
          placeholder="sk-…"
          autocomplete="off"
          spellcheck="false"
        />
      </label>

      <label>
        <span>Model</span>
        <select id="model">
          <option value="gpt-4o-mini">
            gpt-4o-mini (fast, cheap — default)
          </option>
          <option value="gpt-4o">gpt-4o</option>
          <option value="gpt-4.1-mini">gpt-4.1-mini</option>
          <option value="gpt-4.1">gpt-4.1</option>
          <option value="o4-mini">o4-mini</option>
          <option value="gpt-5-mini">gpt-5-mini</option>
        </select>
      </label>

      <div class="row">
        <button id="test">Test key</button>
        <button id="save" class="primary">Save</button>
      </div>

      <p id="status" class="status" role="status" aria-live="polite"></p>
    </main>

    <script src="options.js"></script>
  </body>
</html>
